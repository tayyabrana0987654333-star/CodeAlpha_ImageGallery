<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAlpha Wanderframe — A Travel Photo Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#1a1815;
    --charcoal-soft:#232019;
    --paper:#f2ead9;
    --paper-dim:#c9bfa8;
    --amber:#c9954a;
    --teal:#4a6a6c;
    --rust:#b1523f;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{
    background:var(--charcoal);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Sprocket strip signature ---------- */
  .sprocket-row{
    display:flex;
    gap:14px;
    padding:6px 24px;
    background:#0f0e0c;
  }
  .sprocket-row span{
    width:8px;height:8px;
    background:var(--charcoal);
    border-radius:1px;
    flex-shrink:0;
  }

  /* ---------- Header ---------- */
  header{
    padding:64px 6vw 32px;
    text-align:center;
    border-bottom:1px solid #35312a;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    letter-spacing:.25em;
    font-size:12px;
    color:var(--amber);
    text-transform:uppercase;
  }
  h1{
    font-family:'Fraunces',serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(2.4rem,6vw,4.5rem);
    margin:10px 0 12px;
    letter-spacing:-0.01em;
  }
  header p{
    color:var(--paper-dim);
    max-width:520px;
    margin:0 auto;
    font-size:15px;
    line-height:1.6;
  }

  /* ---------- Filter tabs (film-canister labels) ---------- */
  .filters{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    padding:32px 6vw 8px;
  }
  .filter-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    background:transparent;
    border:1px solid #4a453b;
    color:var(--paper-dim);
    padding:9px 18px;
    border-radius:20px;
    cursor:pointer;
    transition:all .25s ease;
  }
  .filter-btn:hover{
    border-color:var(--amber);
    color:var(--paper);
  }
  .filter-btn.active{
    background:var(--amber);
    border-color:var(--amber);
    color:#1a1815;
    font-weight:600;
  }

  /* ---------- Gallery grid ---------- */
  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:22px;
    padding:36px 6vw 80px;
  }
  figure{
    margin:0;
    position:relative;
    overflow:hidden;
    border-radius:var(--radius);
    background:var(--charcoal-soft);
    cursor:pointer;
    aspect-ratio:4/5;
    opacity:0;
    transform:translateY(14px);
    animation:rise .6s ease forwards;
  }
  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  figure img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
    transition:transform .6s cubic-bezier(.2,.8,.2,1), filter .6s ease;
    filter:grayscale(15%) contrast(1.02);
  }
  figure:hover img{
    transform:scale(1.08);
    filter:grayscale(0%) contrast(1.05);
  }
  figcaption{
    position:absolute;
    inset:auto 0 0 0;
    padding:16px 16px 14px;
    background:linear-gradient(180deg,transparent,rgba(10,9,7,.92));
    transform:translateY(100%);
    transition:transform .4s cubic-bezier(.2,.8,.2,1);
  }
  figure:hover figcaption{transform:translateY(0);}
  figcaption .frame-no{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--amber);
    display:block;
    margin-bottom:2px;
  }
  figcaption .cap-title{
    font-family:'Fraunces',serif;
    font-size:17px;
    font-weight:600;
  }
  .tag-pill{
    position:absolute;
    top:12px;left:12px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.06em;
    text-transform:uppercase;
    background:rgba(15,14,12,.75);
    border:1px solid rgba(242,234,217,.25);
    color:var(--paper);
    padding:4px 9px;
    border-radius:20px;
    backdrop-filter:blur(2px);
  }

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed;inset:0;
    background:rgba(10,9,7,.96);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  .lightbox.open{opacity:1;pointer-events:auto;}
  .lb-frame{
    position:relative;
    max-width:min(88vw,1000px);
    max-height:80vh;
    animation:pop .35s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes pop{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
  .lb-frame img{
    max-width:100%;max-height:80vh;
    display:block;
    border-radius:var(--radius);
    box-shadow:0 30px 80px rgba(0,0,0,.6);
  }
  .lb-meta{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-top:14px;
    font-family:'JetBrains Mono',monospace;
    color:var(--paper-dim);
    font-size:12px;
    letter-spacing:.05em;
  }
  .lb-meta .lb-title{
    font-family:'Fraunces',serif;
    color:var(--paper);
    font-size:18px;
    letter-spacing:0;
  }
  .lb-counter{color:var(--amber);}

  .lb-close, .lb-nav{
    position:absolute;
    background:transparent;
    border:1px solid rgba(242,234,217,.3);
    color:var(--paper);
    cursor:pointer;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s ease;
    font-size:18px;
    line-height:1;
  }
  .lb-close{
    top:-52px;right:0;
    width:38px;height:38px;
  }
  .lb-nav{
    top:50%;
    transform:translateY(-50%);
    width:48px;height:48px;
    font-size:22px;
  }
  .lb-nav.prev{left:-64px;}
  .lb-nav.next{right:-64px;}
  .lb-close:hover,.lb-nav:hover{
    border-color:var(--amber);
    color:var(--amber);
    background:rgba(201,149,74,.08);
  }

  @media (max-width:760px){
    .lb-nav.prev{left:6px;}
    .lb-nav.next{right:6px;}
    .lb-close{top:-46px;right:6px;}
    header{padding:48px 6vw 24px;}
  }

  footer{
    text-align:center;
    padding:26px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:#5a5548;
    border-top:1px solid #2c2820;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>

<div class="sprocket-row">
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<header>
  <div class="eyebrow"> Exposed on Location</div>
  <h1>CodeAlpha Wanderframe</h1>
  <p>Twelve frames, four corners of the world. Click any exposure to step into the projector view.</p>
</header>

<nav class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">All Frames</button>
  <button class="filter-btn" data-filter="mountains">Mountains</button>
  <button class="filter-btn" data-filter="ocean">Ocean</button>
  <button class="filter-btn" data-filter="urban">Urban</button>
  <button class="filter-btn" data-filter="desert">Desert</button>
</nav>

<main class="gallery" id="gallery"></main>

<div class="lightbox" id="lightbox">
  <div class="lb-frame">
    <button class="lb-nav prev" id="lbPrev" aria-label="Previous image">&#8249;</button>
    <img id="lbImage" src="" alt="">
    <button class="lb-nav next" id="lbNext" aria-label="Next image">&#8250;</button>
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <div class="lb-meta">
      <span class="lb-title" id="lbTitle"></span>
      <span class="lb-counter" id="lbCounter"></span>
    </div>
  </div>
</div>

<div class="sprocket-row">
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<footer>© Wanderframe — a demo gallery, developed frame by frame.</footer>

<script>
const photos = [
  {seed:'mtn1', title:'Ridge at First Light', tag:'mountains'},
  {seed:'mtn2', title:'Above the Cloud Line', tag:'mountains'},
  {seed:'mtn3', title:'Granite & Snowmelt', tag:'mountains'},
  {seed:'ocean1', title:'Low Tide, No Wind', tag:'ocean'},
  {seed:'ocean2', title:'Salt Spray Blue', tag:'ocean'},
  {seed:'ocean3', title:'Reef Edge', tag:'ocean'},
  {seed:'urban1', title:'Neon After Rain', tag:'urban'},
  {seed:'urban2', title:'Rooftops, Dusk', tag:'urban'},
  {seed:'urban3', title:'Platform 9, 6AM', tag:'urban'},
  {seed:'desert1', title:'Dune Shadow Line', tag:'desert'},
  {seed:'desert2', title:'Heat on the Horizon', tag:'desert'},
  {seed:'desert3', title:'Salt Flat Mirror', tag:'desert'}
];

const gallery = document.getElementById('gallery');
const filters = document.getElementById('filters');
let currentFilter = 'all';
let currentList = photos;
let currentIndex = 0;

function imgURL(seed, w, h){
  return `https://picsum.photos/seed/${seed}/${w}/${h}`;
}

function render(){
  gallery.innerHTML = '';
  currentList = currentFilter === 'all' ? photos : photos.filter(p => p.tag === currentFilter);
  currentList.forEach((p, i) => {
    const fig = document.createElement('figure');
    fig.style.animationDelay = (i * 0.05) + 's';
    fig.innerHTML = `
      <span class="tag-pill">${p.tag}</span>
      <img src="${imgURL(p.seed,700,875)}" alt="${p.title}" loading="lazy">
      <figcaption>
        <span class="frame-no">FRAME ${String(i+1).padStart(2,'0')}</span>
        <span class="cap-title">${p.title}</span>
      </figcaption>
    `;
    fig.addEventListener('click', () => openLightbox(i));
    gallery.appendChild(fig);
  });
}

filters.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if(!btn) return;
  filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
});

/* ---------- Lightbox logic ---------- */
const lightbox = document.getElementById('lightbox');
const lbImage = document.getElementById('lbImage');
const lbTitle = document.getElementById('lbTitle');
const lbCounter = document.getElementById('lbCounter');

function openLightbox(index){
  currentIndex = index;
  updateLightbox();
  lightbox.classList.add('open');
}
function updateLightbox(){
  const p = currentList[currentIndex];
  lbImage.style.opacity = 0;
  const img = new Image();
  img.onload = () => { lbImage.src = img.src; lbImage.style.opacity = 1; };
  img.src = imgURL(p.seed, 1200, 900);
  lbImage.style.transition = 'opacity .3s ease';
  lbTitle.textContent = p.title;
  lbCounter.textContent = `${String(currentIndex+1).padStart(2,'0')} / ${String(currentList.length).padStart(2,'0')}`;
}
function closeLightbox(){ lightbox.classList.remove('open'); }
function nextImage(){ currentIndex = (currentIndex + 1) % currentList.length; updateLightbox(); }
function prevImage(){ currentIndex = (currentIndex - 1 + currentList.length) % currentList.length; updateLightbox(); }

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbNext').addEventListener('click', nextImage);
document.getElementById('lbPrev').addEventListener('click', prevImage);
lightbox.addEventListener('click', e => { if(e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', e => {
  if(!lightbox.classList.contains('open')) return;
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowRight') nextImage();
  if(e.key === 'ArrowLeft') prevImage();
});

render();
</script>
</body>
</html>
